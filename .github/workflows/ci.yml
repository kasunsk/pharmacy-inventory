name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Backend unit and integration checks
        run: ./gradlew :backend:clean :backend:test :backend:integrationTest :backend:check --no-daemon

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Docker backend image build
        run: docker build -f backend/Dockerfile -t pharmacy-backend:${{ github.sha }} .

      - name: Docker frontend image build
        run: docker build -f frontend/Dockerfile -t pharmacy-frontend:${{ github.sha }} .

      - name: Trivy filesystem vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'

