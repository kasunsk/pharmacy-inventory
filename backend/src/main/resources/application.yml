spring:
  application:
    name: pharmacy-inventory
  config:
    import: optional:file:../.env[.properties]
  datasource:
    url: jdbc:h2:mem:pharmacy;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  demo-data:
    enabled: true
  jwt:
    secret: 7a8f56caa34f5b6a7d8c9e01234567897a8f56caa34f5b6a7d8c9e0123456789
    expiration-ms: 86400000
  file-sign:
    secret: 4c5d6e7f8091abcdeffedcba109876544c5d6e7f8091abcdeffedcba10987654
    expiration-ms: 300000
  cors:
    allowed-origin: http://localhost:5173
  ai:
    openrouter:
      api-key: ${OPENROUTER_API_KEY:}
      model: openai/gpt-4o-mini
      endpoint: https://openrouter.ai/api/v1/chat/completions

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/pharmacy
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

